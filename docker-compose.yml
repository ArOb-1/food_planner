services:
  postgres:
    image: postgres:16-alpine
    container_name: mealplan-postgres
    environment:
      POSTGRES_USER: mealplan
      POSTGRES_PASSWORD: mealplan
      POSTGRES_DB: mealplan
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mealplan"]
      interval: 3s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mealplan-redis
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    container_name: mealplan-backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    working_dir: /code
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://mealplan:mealplan@postgres:5432/mealplan
      REDIS_URL: redis://redis:6379
  
  frontend:
    build: ./frontend
    container_name: mealplan-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data: