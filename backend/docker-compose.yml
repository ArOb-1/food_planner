version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: mealplan-postgres
    environment:
      POSTGRES_USER: mealplan
      POSTGRES_PASSWORD: mealplan
      POSTGRES_DB: mealplan
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: mealplan-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: